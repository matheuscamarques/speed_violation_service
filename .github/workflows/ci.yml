name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Checkstyle (validate conventions)
        run: mvn -B validate -f SpeedViolationService/pom.xml

      - name: Unit and integration tests
        run: mvn -B test -f SpeedViolationService/pom.xml

      - name: Coverage check (JaCoCo)
        run: mvn -B verify -f SpeedViolationService/pom.xml -Dspring-cloud-contract.skip=true -Dcontract.verifier.skip=true

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SpeedViolationService

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Make wrapper executable
        run: chmod +x mvnw

      - name: Checkstyle (validate conventions)
        run: ./mvnw -B validate

      - name: Unit and integration tests
        run: ./mvnw -B test

      - name: Coverage check (JaCoCo)
        run: ./mvnw -B verify -Dspring-cloud-contract.skip=true -Dcontract.verifier.skip=true

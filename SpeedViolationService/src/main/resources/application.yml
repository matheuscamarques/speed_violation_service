server:
  port: 8080

spring:
  application:
    name: SpeedViolationService
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:file:./data/speedviolation
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

speed:
  violation:
    tolerance-fixed: 7.0
    tolerance-percentage: 7.0
    threshold: 100.0
    excess-limit-medium: 20.0
    excess-limit-serious: 50.0

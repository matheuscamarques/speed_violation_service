request:
  method: POST
  url: /api/v1/violations/evaluate
  headers:
    x-origin: FIXED
  body:
    licensePlate: "ABC1D23"
    measuredSpeed: 67
    speedLimit: 60
    equipmentId: "RAD-001"
    captureTimestamp: "2025-01-01T10:00:00Z"
  matchers:
    body:
      - path: $.licensePlate
        type: by_regex
        value: "[A-Z]{3}[0-9][A-Z][0-9]{2}|[A-Z]{3}[0-9]{4}"
response:
  status: 200
  body:
    licensePlate: "ABC1D23"
    equipmentId: "RAD-001"
    measuredSpeed: 67
    consideredSpeed: 60
    speedLimit: 60
    excessPercentage: 0
    hasViolation: false
  matchers:
    body:
      - path: $.processedAt
        type: by_regex
        value: ".*"

request:
  method: POST
  url: /api/v1/violations/evaluate
  headers:
    x-origin: FIXED
    Content-Type: application/json
  body:
    licensePlate: "ABC1234"
    measuredSpeed: 92
    speedLimit: 60
    equipmentId: "RAD-001"
    captureTimestamp: "2025-01-01T10:00:00Z"
  matchers:
    body:
      - path: $.licensePlate
        type: by_regex
        value: "[A-Z]{3}[0-9][A-Z][0-9]{2}|[A-Z]{3}[0-9]{4}"
response:
  status: 200
  body:
    licensePlate: "ABC1234"
    equipmentId: "RAD-001"
    measuredSpeed: 92
    consideredSpeed: 85
    speedLimit: 60
    excessPercentage: 41.67
    hasViolation: true
    violation:
      severity: "SERIOUS"
      ctbCode: "218-II"
  matchers:
    body:
      - path: $.processedAt
        type: by_regex
        value: ".*"

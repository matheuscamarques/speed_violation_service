request:
  method: POST
  url: /api/v1/violations/evaluate
  headers:
    x-origin: FIXED
    Content-Type: application/json
  body:
    licensePlate: "ABC1D23"
    measuredSpeed: 118
    speedLimit: 110
    equipmentId: "RAD-001"
    captureTimestamp: "2025-01-01T10:00:00Z"
  matchers:
    body:
      - path: $.licensePlate
        type: by_regex
        value: "[A-Z]{3}[0-9][A-Z][0-9]{2}|[A-Z]{3}[0-9]{4}"
response:
  status: 200
  body:
    licensePlate: "ABC1D23"
    equipmentId: "RAD-001"
    measuredSpeed: 118
    consideredSpeed: 110.3
    speedLimit: 110
    excessPercentage: 0.27
    hasViolation: true
    violation:
      severity: "MEDIUM"
      ctbCode: "218-I"
  matchers:
    body:
      - path: $.processedAt
        type: by_regex
        value: ".*"
